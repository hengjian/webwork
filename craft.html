<main class="pt-5 mt-5">
    <section id="craft" class="py-5 bg-light">
        <div class="container">
            <div class="section-title text-center mb-5">
                <h2 class="display-5 fw-bold">🪶 非遗工艺科普</h2>
                <p>揭秘油纸伞传统制作技艺 · 七步核心工艺</p>
            </div>
            <div class="row text-center g-4">
                <div class="col-md-6 col-lg-3">
                    <div class="craft-step p-3">
                        <div class="step-icon"><i class="fas fa-tree"></i></div>
                        <h4>1. 选竹</h4>
                        <p>选用3年以上楠竹或慈竹，要求韧性好、无虫蛀，经水浸日晒防蛀。</p>
                        <img src="img/xuan.jpg" class="card-img-top gallery-img">
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="craft-step p-3">
                        <div class="step-icon"><i class="fas fa-cut"></i></div>
                        <h4>2. 削伞骨</h4>
                        <p>手工削制36根长短骨，每根误差不超过1mm，钻孔串联。</p>
                        <img src="img/gu.jpg" class="card-img-top gallery-img">
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="craft-step p-3">
                        <div class="step-icon"><i class="fas fa-paintbrush"></i></div>
                        <h4>3. 裱纸绘花</h4>
                        <p>采用桑皮纸或棉纸，用柿子胶水粘贴伞面，手绘花鸟山水。</p>
                        <img src="img/zhi.jpg" class="card-img-top gallery-img">
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="craft-step p-3">
                        <div class="step-icon"><i class="fas fa-oil-can"></i></div>
                        <h4>4. 刷桐油</h4>
                        <p>天然桐油分三次刷制，每遍阴干7天，达到防水耐用效果。</p>
                        <img src="img/you.jpg" class="card-img-top gallery-img">
                    </div>
                </div>
            </div>
        </div>
    </section>
