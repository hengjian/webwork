<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动留言区 | 油纸伞</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="fas fa-umbrella"></i> 纸伞·遗韵</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                <li class="nav-item"><a class="nav-link" href="gallery.html">非遗作品展示</a></li>
                <li class="nav-item"><a class="nav-link" href="story.html">传承人故事</a></li>
                <li class="nav-item"><a class="nav-link" href="craft.html">非遗工艺科普</a></li>
                <li class="nav-item"><a class="nav-link active" href="message.html">互动留言区</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="pt-5 mt-5">
    <section id="message" class="py-5">
        <div class="container">
            <div class="section-title text-center mb-5">
                <h2 class="display-5 fw-bold">📝 互动留言区</h2>
                <p>分享您与油纸伞的故事，或对非遗文化的感悟</p>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card shadow-sm border-0 p-4 bg-white rounded-4">
                        <form id="messageForm">
                            <div class="mb-3">
                                <label for="nameInput" class="form-label"><i class="fas fa-user"></i> 昵称</label>
                                <input type="text" class="form-control" id="nameInput" placeholder="请输入称呼">
                                <div class="invalid-feedback">请填写昵称</div>
                            </div>
                            <div class="mb-3">
                                <label for="messageContent" class="form-label"><i class="fas fa-comment-dots"></i> 留言内容</label>
                                <textarea class="form-control" id="messageContent" rows="4" placeholder="写下您的建议、赞美或疑问..."></textarea>
                                <div class="invalid-feedback">留言内容不能为空</div>
                            </div>
                            <div class="d-grid gap-2 d-md-block text-md-end">
                                <button type="button" id="submitMsgBtn" class="btn btn-primary px-4" style="background:#8b3c2c; border-color:#6b2c1f;">提交留言</button>
                            </div>
                        </form>
                        <hr class="my-4">
                        <h5><i class="fas fa-history"></i> 访客寄语</h5>
                        <ul id="commentList" class="list-group list-group-flush">
                            <li class="list-group-item bg-transparent">✨ 油纸伞承载着童年的江南记忆，支持非遗！</li>
                            <li class="list-group-item bg-transparent">🌸 希望以后能购买到真正的传统桐油纸伞，弘扬国粹。</li>
                            <li class="list-group-item bg-transparent">🏮 工艺科普太棒了，原来工序这么复杂，致敬匠人。</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="footer py-4 text-center text-white">
    <div class="container">
        <p>&copy; 2025 传统油纸伞非遗传承</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
